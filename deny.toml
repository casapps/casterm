# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore yanked crates during dev (CI enforces this)
ignore = []

[licenses]
# Allow these SPDX license identifiers
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]

exceptions = []

[bans]
# Deny duplicate crate versions where possible
multiple-versions = "warn"

# Crates that must never appear in the dependency tree
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
# Only allow crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
