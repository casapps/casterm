# CASTERM Automated Test Compose
# AI-usable: ephemeral containers, tmpfs mounts, isolated network
# Usage: docker compose -f docker/docker-compose.test.yml run test

services:
  test:
    image: casjaysdev/rust:latest
    working_dir: /work
    volumes:
      - ..:/work
    tmpfs:
      - /tmp:exec
    environment:
      - CARGO_HOME=/usr/local/cargo
      - CARGO_TARGET_DIR=/tmp/target
      - RUST_TEST_THREADS=1
      - RUST_LOG=error
    networks:
      - test-net
    command: cargo test --workspace --all-features

  lint:
    image: casjaysdev/rust:latest
    working_dir: /work
    volumes:
      - ..:/work
    environment:
      - CARGO_HOME=/usr/local/cargo
      - CARGO_TARGET_DIR=/tmp/target
    networks:
      - test-net
    command: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt-check:
    image: casjaysdev/rust:latest
    working_dir: /work
    volumes:
      - ..:/work
    environment:
      - CARGO_HOME=/usr/local/cargo
    networks:
      - test-net
    command: cargo fmt --all --check

networks:
  test-net:
    driver: bridge
